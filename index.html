<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 86</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#14171B;
    --surface:#1D2228;
    --surface-2:#242A31;
    --line:#31383F;
    --chalk:#EAE5D9;
    --chalk-dim:#9BA1A6;
    --urgent:#FF6B5E;
    --normal:#F2B63C;
    --low:#57B49F;
    --radius:12px;
    --font-display:"Barlow Condensed", "Arial Narrow", sans-serif;
    --font-body:"Inter", -apple-system, system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--board);
    color:var(--chalk);
    font-family:var(--font-body);
    font-size:15px;
    line-height:1.5;
    min-height:100vh;
    background-image:radial-gradient(ellipse at 50% -10%, rgba(255,255,255,.045), transparent 60%);
  }
  .wrap{max-width:640px;margin:0 auto;padding:28px 16px 80px}

  /* ---------- header ---------- */
  header{margin-bottom:26px}
  .brand{
    font-family:var(--font-display);
    font-weight:700;
    font-size:44px;
    letter-spacing:.04em;
    line-height:1;
    text-transform:uppercase;
  }
  .brand .eight-six{
    color:var(--urgent);
    padding:0 6px;
    position:relative;
  }
  .brand .eight-six::after{
    content:"";
    position:absolute;left:2px;right:2px;bottom:-6px;height:3px;
    background:var(--urgent);
    border-radius:2px;
    transform:rotate(-1.2deg);
    opacity:.85;
  }
  .tagline{
    color:var(--chalk-dim);
    font-size:13px;
    margin-top:12px;
    letter-spacing:.02em;
  }
  .conn{
    display:inline-flex;align-items:center;gap:6px;
    font-size:12px;color:var(--chalk-dim);margin-top:6px;
  }
  .conn .dot{width:7px;height:7px;border-radius:50%;background:#555;flex:none}
  .conn.ok .dot{background:var(--low)}
  .conn.err .dot{background:var(--urgent)}

  /* ---------- name ---------- */
  .who{
    display:flex;align-items:center;gap:10px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:10px 14px;
    margin-bottom:14px;
  }
  .who label{font-size:13px;color:var(--chalk-dim);white-space:nowrap}
  .who input{
    flex:1;min-width:0;
    background:transparent;border:none;outline:none;
    color:var(--chalk);font:600 15px var(--font-body);
  }
  .who input::placeholder{color:#5d646b;font-weight:400}

  /* ---------- add form ---------- */
  .add-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 14px;
    margin-bottom:34px;
  }
  .add-card input[type=text]{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:9px;
    padding:12px 14px;
    color:var(--chalk);
    font:500 16px var(--font-body);
    outline:none;
  }
  .add-card input[type=text]:focus{border-color:var(--chalk-dim)}
  .add-card input::placeholder{color:#5d646b;font-weight:400}
  .form-note{
    width:100%;
    margin-top:10px;
    min-height:56px;resize:vertical;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:9px;
    padding:10px 14px;
    color:var(--chalk);
    font:400 14px var(--font-body);
    outline:none;
  }
  .form-note:focus{border-color:var(--chalk-dim)}
  .form-note::placeholder{color:#5d646b}
  .del-btn{
    flex:none;
    background:none;border:none;cursor:pointer;
    color:#5d646b;
    font:600 16px var(--font-body);
    line-height:1;
    padding:4px 6px;margin-top:1px;
    border-radius:6px;
  }
  .del-btn:hover{color:var(--urgent)}
  .del-btn:focus-visible{outline:2px solid var(--chalk);outline-offset:2px}
  .del-btn.confirm{
    color:var(--urgent);
    background:rgba(255,107,94,.14);
    font-size:11px;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;
    padding:5px 9px;
  }
  .prio-row{display:flex;gap:8px;margin:12px 0}
  .prio-btn{
    flex:1;
    font:600 13px var(--font-body);
    letter-spacing:.03em;
    padding:10px 0;
    border-radius:9px;
    border:1.5px solid var(--line);
    background:transparent;
    color:var(--chalk-dim);
    cursor:pointer;
    transition:background .12s,border-color .12s,color .12s;
  }
  .prio-btn:focus-visible{outline:2px solid var(--chalk);outline-offset:2px}
  .prio-btn[data-p=low].sel{border-color:var(--low);color:var(--low);background:rgba(87,180,159,.12)}
  .prio-btn[data-p=normal].sel{border-color:var(--normal);color:var(--normal);background:rgba(242,182,60,.12)}
  .prio-btn[data-p=urgent].sel{border-color:var(--urgent);color:var(--urgent);background:rgba(255,107,94,.13)}
  .add-btn{
    width:100%;
    font:700 16px var(--font-display);
    letter-spacing:.09em;
    text-transform:uppercase;
    padding:13px 0;
    border:none;border-radius:9px;
    background:var(--chalk);color:#15181C;
    cursor:pointer;
  }
  .add-btn:hover{background:#fff}
  .add-btn:disabled{opacity:.4;cursor:not-allowed}
  .add-btn:focus-visible{outline:2px solid var(--chalk);outline-offset:2px}
  .form-hint{font-size:12px;color:var(--urgent);margin-top:8px;display:none}

  /* ---------- burger + sidebar ---------- */
  header{position:relative}
  .burger{
    position:absolute;top:2px;right:0;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:9px;
    color:var(--chalk);
    font-size:20px;line-height:1;
    padding:9px 12px;cursor:pointer;
  }
  .burger:hover{border-color:var(--chalk-dim)}
  .burger:focus-visible{outline:2px solid var(--chalk);outline-offset:2px}
  .burger .pend-dot{
    position:absolute;top:-4px;right:-4px;
    min-width:18px;height:18px;border-radius:10px;
    background:var(--urgent);color:#fff;
    font:700 11px/18px var(--font-body);
    text-align:center;padding:0 4px;
    display:none;
  }
  .sb-overlay{
    position:fixed;inset:0;z-index:60;
    background:rgba(10,12,14,.6);
    backdrop-filter:blur(2px);
    display:none;
  }
  .sb-overlay.show{display:block}
  .sidebar{
    position:fixed;top:0;right:0;bottom:0;z-index:61;
    width:min(430px,94vw);
    background:var(--board);
    border-left:1px solid var(--line);
    transform:translateX(105%);
    transition:transform .2s ease-out;
    overflow-y:auto;
    padding:18px 16px 60px;
  }
  .sidebar.open{transform:none}
  @media (prefers-reduced-motion: reduce){ .sidebar{transition:none} }
  .sb-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .sb-head h2{
    font-family:var(--font-display);
    font-size:26px;font-weight:600;
    letter-spacing:.05em;text-transform:uppercase;
    flex:1;
  }
  .sb-close{
    background:none;border:none;cursor:pointer;
    color:var(--chalk-dim);font-size:18px;padding:6px 8px;border-radius:6px;
  }
  .sb-close:hover{color:var(--chalk)}
  .sb-close:focus-visible{outline:2px solid var(--chalk);outline-offset:2px}

  .mgr-box{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:10px 12px;margin-bottom:14px;
  }
  .mgr-row{display:flex;gap:8px;align-items:center}
  .mgr-row input{
    flex:1;min-width:0;
    background:var(--surface-2);
    border:1px solid var(--line);border-radius:8px;
    padding:9px 12px;color:var(--chalk);
    font:500 15px var(--font-body);outline:none;
    letter-spacing:.2em;
  }
  .mgr-row input:focus{border-color:var(--chalk-dim)}
  .mgr-on{display:flex;align-items:center;gap:8px;font-size:13px}
  .mgr-on .mdot{width:8px;height:8px;border-radius:50%;background:var(--low)}
  .mgr-on .lock-btn{margin-left:auto}
  .mgr-err{font-size:12px;color:var(--urgent);margin-top:6px;display:none}

  .sb-add{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px;margin-bottom:20px;
  }
  .sb-add input{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;color:var(--chalk);
    font:500 15px var(--font-body);outline:none;
  }
  .sb-add input:focus,.sb-add textarea:focus{border-color:var(--chalk-dim)}
  .sb-add input::placeholder,.sb-add textarea::placeholder{color:#5d646b;font-weight:400}
  .sb-add textarea{
    width:100%;margin-top:8px;min-height:48px;resize:vertical;
    background:var(--surface-2);
    border:1px solid var(--line);border-radius:8px;
    padding:9px 12px;color:var(--chalk);
    font:400 13.5px var(--font-body);outline:none;
  }
  .sb-add .add-btn{margin-top:10px;padding:11px 0;font-size:15px}

  .st{
    flex:none;
    font:700 10.5px var(--font-body);
    letter-spacing:.06em;text-transform:uppercase;
    border-radius:20px;padding:3px 9px;margin-top:2px;
  }
  .st.pending{color:var(--normal);background:rgba(242,182,60,.14)}
  .st.approved{color:var(--low);background:rgba(87,180,159,.14)}
  .st.rejected{color:var(--urgent);background:rgba(255,107,94,.14)}
  .inv-group-label{
    font:600 12px var(--font-body);
    letter-spacing:.1em;text-transform:uppercase;
    color:var(--chalk-dim);
    margin:18px 0 8px;
  }
  .decide-row{display:flex;gap:8px;margin-top:10px;padding-left:0}
  .decide-btn{
    flex:1;font:600 13px var(--font-body);
    padding:8px 0;border-radius:8px;cursor:pointer;
    border:1.5px solid var(--line);background:transparent;
  }
  .decide-btn.ok{color:var(--low);border-color:var(--low)}
  .decide-btn.ok:hover{background:rgba(87,180,159,.12)}
  .decide-btn.no{color:var(--urgent);border-color:var(--urgent)}
  .decide-btn.no:hover{background:rgba(255,107,94,.12)}
  .decide-btn:focus-visible{outline:2px solid var(--chalk);outline-offset:2px}

  /* ---------- date sections ---------- */
  .day{margin-bottom:30px}
  .day-head{
    display:flex;align-items:baseline;gap:10px;
    border-bottom:1px dashed var(--line);
    padding-bottom:8px;margin-bottom:14px;
  }
  .day-head h2{
    font-family:var(--font-display);
    font-size:22px;font-weight:600;
    letter-spacing:.05em;text-transform:uppercase;
  }
  .day-head .count{font-size:12px;color:var(--chalk-dim)}
  .day-head .today-tag{
    font:600 11px var(--font-body);
    color:var(--board);background:var(--chalk);
    border-radius:20px;padding:2px 9px;letter-spacing:.04em;
  }

  /* ---------- item cards ---------- */
  .item{
    background:var(--surface);
    border:1px solid var(--line);
    border-left:4px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:10px;
  }
  .item.p-urgent{border-left-color:var(--urgent)}
  .item.p-normal{border-left-color:var(--normal)}
  .item.p-low{border-left-color:var(--low)}
  .item.done{opacity:.45}
  .item.done .item-name{text-decoration:line-through}
  .item-top{display:flex;align-items:flex-start;gap:10px}
  .check{
    flex:none;width:22px;height:22px;margin-top:1px;
    border:1.5px solid var(--chalk-dim);
    border-radius:6px;background:transparent;
    cursor:pointer;color:transparent;
    font-size:14px;line-height:1;
    display:flex;align-items:center;justify-content:center;
  }
  .item.done .check{background:var(--chalk);border-color:var(--chalk);color:var(--board)}
  .check:focus-visible{outline:2px solid var(--chalk);outline-offset:2px}
  .item-main{flex:1;min-width:0}
  .item-name{font-weight:600;font-size:15.5px;overflow-wrap:anywhere}
  .item-meta{font-size:12px;color:var(--chalk-dim);margin-top:2px}
  .tag{
    flex:none;
    font:700 11px var(--font-body);
    letter-spacing:.06em;text-transform:uppercase;
    border-radius:20px;padding:3px 10px;margin-top:2px;
  }
  .tag.urgent{color:var(--urgent);background:rgba(255,107,94,.14)}
  .tag.normal{color:var(--normal);background:rgba(242,182,60,.14)}
  .tag.low{color:var(--low);background:rgba(87,180,159,.14)}

  .note-block{margin-top:10px;padding-left:32px}
  .note-text{
    font-size:13.5px;color:var(--chalk);
    background:var(--surface-2);
    border-radius:8px;padding:9px 11px;
    border:1px solid var(--line);
    white-space:pre-wrap;overflow-wrap:anywhere;
  }
  .note-label{font-size:11px;color:var(--chalk-dim);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
  .note-add-btn,.note-edit-btn{
    background:none;border:none;cursor:pointer;
    color:var(--chalk-dim);font:500 12.5px var(--font-body);
    padding:2px 0;text-decoration:underline;text-underline-offset:3px;
  }
  .note-add-btn:hover,.note-edit-btn:hover{color:var(--chalk)}
  .note-add-btn:focus-visible,.note-edit-btn:focus-visible{outline:2px solid var(--chalk);outline-offset:2px}
  .note-form textarea{
    width:100%;min-height:64px;resize:vertical;
    background:var(--surface-2);
    border:1px solid var(--line);border-radius:8px;
    color:var(--chalk);font:400 13.5px var(--font-body);
    padding:9px 11px;outline:none;
  }
  .note-form textarea:focus{border-color:var(--chalk-dim)}
  .note-form-actions{display:flex;gap:8px;margin-top:6px}
  .btn-sm{
    font:600 12.5px var(--font-body);
    border-radius:7px;padding:6px 14px;cursor:pointer;border:1px solid var(--line);
    background:var(--chalk);color:var(--board);
  }
  .btn-sm.ghost{background:transparent;color:var(--chalk-dim)}
  .btn-sm:focus-visible{outline:2px solid var(--chalk);outline-offset:2px}

  .empty{
    text-align:center;color:var(--chalk-dim);
    padding:34px 10px;font-size:14px;
    border:1px dashed var(--line);border-radius:var(--radius);
  }
  .log-title{
    font-family:var(--font-display);
    font-size:16px;font-weight:600;letter-spacing:.12em;
    text-transform:uppercase;color:var(--chalk-dim);
    margin:38px 0 16px;
    display:flex;align-items:center;gap:12px;
  }
  .log-title::after{content:"";flex:1;height:1px;background:var(--line)}
  details.day summary{
    list-style:none;cursor:pointer;
  }
  details.day summary::-webkit-details-marker{display:none}
  details.day summary .day-head{margin-bottom:0}
  details.day[open] summary .day-head{margin-bottom:14px}
  details.day summary .chev{margin-left:auto;color:var(--chalk-dim);font-size:12px;transition:transform .15s}
  details.day[open] summary .chev{transform:rotate(90deg)}

  .banner{
    display:none;
    background:rgba(255,107,94,.1);
    border:1px solid rgba(255,107,94,.4);
    color:var(--chalk);
    border-radius:var(--radius);
    padding:12px 14px;font-size:13px;margin-bottom:16px;
  }

  /* ---------- welcome popup ---------- */
  .modal-overlay{
    position:fixed;inset:0;z-index:50;
    background:rgba(10,12,14,.8);
    backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  .modal{
    width:100%;max-width:360px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:16px;
    padding:28px 22px 22px;
    text-align:center;
    animation:pop .18s ease-out;
  }
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .modal h2{
    font-family:var(--font-display);
    font-size:30px;font-weight:600;
    letter-spacing:.03em;text-transform:none;
    margin-bottom:16px;
  }
  .modal input{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:9px;
    padding:12px 14px;
    color:var(--chalk);
    font:500 16px var(--font-body);
    outline:none;
    text-align:center;
    margin-bottom:12px;
  }
  .modal input:focus{border-color:var(--chalk-dim)}
  .modal input::placeholder{color:#5d646b;font-weight:400}
  .modal .add-btn{margin-top:2px}
  @media (prefers-reduced-motion: reduce){
    .modal{animation:none}
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none!important}
  }
</style>
</head>
<body>
<div class="modal-overlay" id="welcomeModal" role="dialog" aria-modal="true" aria-labelledby="welcomeTitle">
  <div class="modal">
    <h2 id="welcomeTitle">Hi, who is there ?</h2>
    <input id="welcomeName" type="text" placeholder="Your name" maxlength="40" autocomplete="off">
    <button class="add-btn" id="welcomeGo" type="button">Let me in</button>
  </div>
</div>
<div class="wrap">

  <header>
    <div class="brand">The <span class="eight-six">86</span></div>
    <p class="tagline">Flagged at close &middot; handled at open</p>
    <div class="conn" id="conn"><span class="dot"></span><span id="connText">Connecting to the board&hellip;</span></div>
    <button class="burger" id="burgerBtn" type="button" aria-label="Open inventory needs" aria-expanded="false">&#9776;<span class="pend-dot" id="pendDot"></span></button>
  </header>

  <div class="banner" id="banner"></div>

  <div class="who">
    <label for="whoInput">Logged by</label>
    <input id="whoInput" type="text" placeholder="Your name" maxlength="40" autocomplete="off">
  </div>

  <div class="add-card">
    <input id="itemInput" type="text" placeholder="What needs attention? e.g. Golden syrup almost out" maxlength="120" autocomplete="off">
    <textarea id="noteInput" class="form-note" placeholder="Closing note for the opener (optional)" maxlength="500"></textarea>
    <div class="prio-row" role="group" aria-label="Priority">
      <button class="prio-btn" data-p="low" type="button">Low</button>
      <button class="prio-btn sel" data-p="normal" type="button">Normal</button>
      <button class="prio-btn" data-p="urgent" type="button">Urgent</button>
    </div>
    <button class="add-btn" id="addBtn" type="button">Add to the board</button>
    <p class="form-hint" id="formHint"></p>
  </div>

  <section id="todaySection"></section>

  <div class="log-title" id="logTitle" style="display:none">Previous closes</div>
  <section id="logSection"></section>

</div>

<div class="sb-overlay" id="sbOverlay"></div>
<aside class="sidebar" id="sidebar" aria-label="Inventory needs" aria-hidden="true">
  <div class="sb-head">
    <h2>Inventory needs</h2>
    <button class="sb-close" id="sbClose" type="button" aria-label="Close inventory panel">&#10005;</button>
  </div>

  <div class="mgr-box" id="mgrBox"></div>

  <div class="sb-add">
    <input id="invInput" type="text" placeholder="What does the bar need? e.g. Old fashioned glasses" maxlength="120" autocomplete="off">
    <textarea id="invNote" placeholder="Details (optional) &mdash; brand, size, quantity" maxlength="500"></textarea>
    <button class="add-btn" id="invAddBtn" type="button">Request it</button>
    <p class="form-hint" id="invHint"></p>
  </div>

  <section id="invSection"></section>
</aside>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.4/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.4/firebase-firestore-compat.min.js"></script>
<script>
(function(){
  "use strict";

  const firebaseConfig = {
    apiKey: "AIzaSyCe1Y0C63z57hHB2iB-DA-fXXxRkaiOI5s",
    authDomain: "the-86-board.firebaseapp.com",
    projectId: "the-86-board",
    storageBucket: "the-86-board.firebasestorage.app",
    messagingSenderId: "1041988989337",
    appId: "1:1041988989337:web:1f32563c4567be0e556308",
    measurementId: "G-6Z2LKQHE1M"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const COL = "board_items";

  /* ---------- helpers ---------- */

  // Plain calendar day: midnight always starts a new day.
  function shiftDateKey(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return y + "-" + m + "-" + day;
  }
  function prettyDate(key){
    const [y,m,d] = key.split("-").map(Number);
    return new Date(y, m-1, d).toLocaleDateString("en-GB",
      {weekday:"short", day:"numeric", month:"short", year:"numeric"});
  }
  function prettyTime(ts){
    if(!ts || !ts.toDate) return "";
    return ts.toDate().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }
  const PRIO_ORDER = {urgent:0, normal:1, low:2};

  /* ---------- state ---------- */
  let selectedPriority = "normal";
  let items = [];
  let managerMode = false;         // unlocked with the manager code, this session only
  let openDecisions = {};          // inv item id -> "approve" | "reject" (note form open)
  let decisionDrafts = {};         // in-progress decision notes, survive re-renders
  let openNoteForms = new Set();   // item ids with an open note editor
  let noteDrafts = {};             // in-progress note text, survives live re-renders
  let openDays = new Set();        // expanded past-date sections
  const connEl = document.getElementById("conn");
  const connText = document.getElementById("connText");
  const banner = document.getElementById("banner");

  /* ---------- sidebar ---------- */
  const sidebar = document.getElementById("sidebar");
  const sbOverlay = document.getElementById("sbOverlay");
  const burgerBtn = document.getElementById("burgerBtn");
  const pendDot = document.getElementById("pendDot");
  const mgrBox = document.getElementById("mgrBox");

  function openSidebar(){
    sidebar.classList.add("open");
    sbOverlay.classList.add("show");
    sidebar.setAttribute("aria-hidden","false");
    burgerBtn.setAttribute("aria-expanded","true");
  }
  function closeSidebar(){
    sidebar.classList.remove("open");
    sbOverlay.classList.remove("show");
    sidebar.setAttribute("aria-hidden","true");
    burgerBtn.setAttribute("aria-expanded","false");
  }
  burgerBtn.addEventListener("click", openSidebar);
  document.getElementById("sbClose").addEventListener("click", closeSidebar);
  sbOverlay.addEventListener("click", closeSidebar);
  document.addEventListener("keydown", e => {
    if(e.key === "Escape" && sidebar.classList.contains("open")) closeSidebar();
  });

  /* ---------- manager auth ---------- */
  // Only a hash of the manager code is stored here, so the code
  // can't be read out of the page source. Note this gates the UI,
  // not the database itself.
  const MGR_HASH = "05744ee6ac5e4d4d6fe17c3a30ff222ac662743a1753c992914ca8a034ae9f66";

  async function sha256hex(s){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  function renderMgrBox(){
    if(managerMode){
      mgrBox.innerHTML =
        '<div class="mgr-on"><span class="mdot"></span>Manager mode &mdash; you can approve or reject requests' +
        '<button class="btn-sm ghost lock-btn" data-act="mgr-lock">Lock</button></div>';
    }else{
      mgrBox.innerHTML =
        '<div class="mgr-row">' +
          '<input id="mgrPin" type="password" inputmode="numeric" placeholder="Manager code" maxlength="12" autocomplete="off" aria-label="Manager code">' +
          '<button class="btn-sm" data-act="mgr-unlock">Unlock</button>' +
        '</div>' +
        '<p class="mgr-err" id="mgrErr">That code isn&rsquo;t right.</p>';
      const pin = document.getElementById("mgrPin");
      pin.addEventListener("keydown", e => { if(e.key === "Enter") tryUnlock(); });
    }
  }

  async function tryUnlock(){
    const pin = document.getElementById("mgrPin");
    const err = document.getElementById("mgrErr");
    if(!pin || !pin.value) return;
    let hex = "";
    try{ hex = await sha256hex(pin.value.trim()); }
    catch(e){ console.error(e); }
    if(hex === MGR_HASH){
      managerMode = true;
      renderMgrBox();
      renderInventory();
    }else{
      pin.value = "";
      if(err) err.style.display = "block";
      setTimeout(() => { if(err) err.style.display = "none"; }, 2500);
    }
  }

  renderMgrBox();

  /* ---------- priority buttons ---------- */
  document.querySelectorAll(".prio-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedPriority = btn.dataset.p;
      document.querySelectorAll(".prio-btn").forEach(b => b.classList.toggle("sel", b === btn));
    });
  });

  /* ---------- add item ---------- */
  const itemInput = document.getElementById("itemInput");
  const noteInput = document.getElementById("noteInput");
  const whoInput = document.getElementById("whoInput");
  const addBtn = document.getElementById("addBtn");
  const formHint = document.getElementById("formHint");

  function showHint(msg){
    formHint.textContent = msg;
    formHint.style.display = "block";
    setTimeout(() => { formHint.style.display = "none"; }, 3000);
  }

  async function addItem(){
    const name = itemInput.value.trim();
    const who = whoInput.value.trim();
    if(!who){ showHint("Add your name first so the opener knows who logged it."); whoInput.focus(); return; }
    if(!name){ showHint("Type what needs attention."); itemInput.focus(); return; }

    addBtn.disabled = true;
    try{
      await db.collection(COL).add({
        name: name,
        type: "close",
        priority: selectedPriority,
        note: noteInput.value.trim(),
        addedBy: who,
        dateKey: shiftDateKey(new Date()),
        done: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      itemInput.value = "";
      noteInput.value = "";
      itemInput.focus();
    }catch(e){
      showHint("Couldn't save — check your connection.");
      console.error(e);
    }finally{
      addBtn.disabled = false;
    }
  }
  addBtn.addEventListener("click", addItem);
  itemInput.addEventListener("keydown", e => { if(e.key === "Enter") addItem(); });

  /* ---------- inventory requests ---------- */
  const invInput = document.getElementById("invInput");
  const invNote = document.getElementById("invNote");
  const invAddBtn = document.getElementById("invAddBtn");
  const invHint = document.getElementById("invHint");

  function showInvHint(msg){
    invHint.textContent = msg;
    invHint.style.display = "block";
    setTimeout(() => { invHint.style.display = "none"; }, 3000);
  }

  async function addInvItem(){
    const name = invInput.value.trim();
    const who = whoInput.value.trim();
    if(!who){ showInvHint("Add your name on the main board first."); return; }
    if(!name){ showInvHint("Type what the bar needs."); invInput.focus(); return; }

    invAddBtn.disabled = true;
    try{
      await db.collection(COL).add({
        name: name,
        type: "bar",
        status: "pending",
        managerNote: "",
        priority: "normal",
        note: invNote.value.trim(),
        addedBy: who,
        dateKey: shiftDateKey(new Date()),
        done: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      invInput.value = "";
      invNote.value = "";
      invInput.focus();
    }catch(e){
      showInvHint("Couldn't save — check your connection.");
      console.error(e);
    }finally{
      invAddBtn.disabled = false;
    }
  }
  invAddBtn.addEventListener("click", addInvItem);
  invInput.addEventListener("keydown", e => { if(e.key === "Enter") addInvItem(); });

  /* ---------- welcome popup ---------- */
  const welcomeModal = document.getElementById("welcomeModal");
  const welcomeName = document.getElementById("welcomeName");
  const welcomeGo = document.getElementById("welcomeGo");

  function enterBoard(){
    const n = welcomeName.value.trim();
    if(!n){ welcomeName.focus(); return; }
    whoInput.value = n;
    welcomeModal.style.display = "none";
    itemInput.focus();
  }
  welcomeGo.addEventListener("click", enterBoard);
  welcomeName.addEventListener("keydown", e => { if(e.key === "Enter") enterBoard(); });
  welcomeName.focus();

  /* ---------- keep "today" accurate across a day rollover ---------- */
  let currentDayKey = shiftDateKey(new Date());
  setInterval(() => {
    const k = shiftDateKey(new Date());
    if(k !== currentDayKey){
      currentDayKey = k;
      render();
    }
  }, 30000); // check twice a minute; cheap and catches midnight promptly

  /* ---------- live data ---------- */
  db.collection(COL).orderBy("createdAt","desc").limit(500).onSnapshot(
    snap => {
      connEl.className = "conn ok";
      connText.textContent = "Live";
      banner.style.display = "none";
      items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    },
    err => {
      connEl.className = "conn err";
      connText.textContent = "Not connected";
      banner.style.display = "block";
      banner.textContent = err.code === "permission-denied"
        ? "Firestore blocked the request. In the Firebase console, enable Cloud Firestore for project \u201Cthe-86-board\u201D and set its security rules to allow reads and writes."
        : "Couldn't reach the database. Check your internet connection and refresh.";
      console.error(err);
    }
  );

  /* ---------- render ---------- */
  function itemCard(it){
    const noteOpen = openNoteForms.has(it.id);
    let noteHtml = "";
    if(noteOpen){
      noteHtml =
        '<div class="note-block"><div class="note-form">' +
          '<textarea id="ta-' + it.id + '" data-draft="' + it.id + '" placeholder="Closing note for the opener\u2026" maxlength="500">' + esc(noteDrafts[it.id] !== undefined ? noteDrafts[it.id] : (it.note || "")) + '</textarea>' +
          '<div class="note-form-actions">' +
            '<button class="btn-sm" data-act="save-note" data-id="' + it.id + '">Save note</button>' +
            '<button class="btn-sm ghost" data-act="cancel-note" data-id="' + it.id + '">Cancel</button>' +
          '</div>' +
        '</div></div>';
    } else if(it.note){
      noteHtml =
        '<div class="note-block">' +
          '<div class="note-label">Closing note</div>' +
          '<div class="note-text">' + esc(it.note) + '</div>' +
          '<button class="note-edit-btn" data-act="open-note" data-id="' + it.id + '">Edit note</button>' +
        '</div>';
    } else {
      noteHtml =
        '<div class="note-block">' +
          '<button class="note-add-btn" data-act="open-note" data-id="' + it.id + '">+ Leave a closing note</button>' +
        '</div>';
    }
    return (
      '<div class="item p-' + esc(it.priority) + (it.done ? " done" : "") + '">' +
        '<div class="item-top">' +
          '<button class="check" data-act="toggle-done" data-id="' + it.id + '" aria-label="' + (it.done ? "Mark as not handled" : "Mark as handled") + '">\u2713</button>' +
          '<div class="item-main">' +
            '<div class="item-name">' + esc(it.name) + '</div>' +
            '<div class="item-meta">' + esc(it.addedBy || "") + (it.createdAt ? " \u00B7 " + prettyTime(it.createdAt) : "") + '</div>' +
          '</div>' +
          '<span class="tag ' + esc(it.priority) + '">' + esc(it.priority) + '</span>' +
          '<button class="del-btn" data-act="delete" data-id="' + it.id + '" aria-label="Delete item">\u2715</button>' +
        '</div>' +
        noteHtml +
      '</div>'
    );
  }

  function sortDay(list){
    return list.slice().sort((a,b) => {
      if(a.done !== b.done) return a.done ? 1 : -1;
      const p = PRIO_ORDER[a.priority] - PRIO_ORDER[b.priority];
      if(p !== 0) return p;
      const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
      const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
      return tb - ta;
    });
  }

  function render(){
    // items without a type are older entries from before inventory existed
    const closeItems = items.filter(it => (it.type || "close") !== "bar");

    const todayKey = shiftDateKey(new Date());
    const byDay = {};
    closeItems.forEach(it => {
      const k = it.dateKey || "unknown";
      (byDay[k] = byDay[k] || []).push(it);
    });

    // today
    const todaySection = document.getElementById("todaySection");
    const todayItems = sortDay(byDay[todayKey] || []);
    let html = '<div class="day"><div class="day-head">' +
      '<h2>' + prettyDate(todayKey) + '</h2>' +
      '<span class="today-tag">Tonight\u2019s close</span>' +
      '<span class="count">' + todayItems.length + (todayItems.length === 1 ? " item" : " items") + '</span>' +
      '</div>';
    html += todayItems.length
      ? todayItems.map(itemCard).join("")
      : '<div class="empty">Nothing flagged yet. Anything running low or needed for the morning goes here.</div>';
    html += '</div>';
    todaySection.innerHTML = html;

    // past days
    const pastKeys = Object.keys(byDay).filter(k => k !== todayKey && k !== "unknown").sort().reverse();
    document.getElementById("logTitle").style.display = pastKeys.length ? "flex" : "none";
    const logSection = document.getElementById("logSection");
    logSection.innerHTML = pastKeys.map(k => {
      const list = sortDay(byDay[k]);
      const open = openDays.has(k) ? " open" : "";
      return '<details class="day" data-day="' + esc(k) + '"' + open + '>' +
        '<summary><div class="day-head">' +
          '<h2>' + prettyDate(k) + '</h2>' +
          '<span class="count">' + list.length + (list.length === 1 ? " item" : " items") + '</span>' +
          '<span class="chev">\u25B6</span>' +
        '</div></summary>' +
        list.map(itemCard).join("") +
      '</details>';
    }).join("");

    // remember expanded/collapsed state of past days
    logSection.querySelectorAll("details.day").forEach(d => {
      d.addEventListener("toggle", () => {
        const k = d.dataset.day;
        if(d.open) openDays.add(k); else openDays.delete(k);
      });
    });

    renderInventory();
  }

  function invCard(it){
    const status = it.status || "pending";
    const decision = openDecisions[it.id];

    let bodyHtml = "";
    if(it.note){
      bodyHtml +=
        '<div class="note-block">' +
          '<div class="note-label">Request details</div>' +
          '<div class="note-text">' + esc(it.note) + '</div>' +
        '</div>';
    }
    if(status !== "pending" && it.managerNote){
      bodyHtml +=
        '<div class="note-block">' +
          '<div class="note-label">' + (status === "approved" ? "Order confirmation" : "Rejection note") + '</div>' +
          '<div class="note-text">' + esc(it.managerNote) + '</div>' +
        '</div>';
    }
    if(decision){
      const approving = decision === "approve";
      bodyHtml +=
        '<div class="note-block"><div class="note-form">' +
          '<textarea id="dta-' + it.id + '" data-decdraft="' + it.id + '" placeholder="' +
            (approving ? "Order confirmation \u2014 e.g. Ordered from BestBar, arriving Friday (optional)"
                       : "Reason for rejection \u2014 e.g. Too pricey this month (optional)") +
          '" maxlength="500">' + esc(decisionDrafts[it.id] || "") + '</textarea>' +
          '<div class="note-form-actions">' +
            '<button class="btn-sm" data-act="decide-save" data-id="' + it.id + '">' + (approving ? "Approve request" : "Reject request") + '</button>' +
            '<button class="btn-sm ghost" data-act="decide-cancel" data-id="' + it.id + '">Cancel</button>' +
          '</div>' +
        '</div></div>';
    } else if(managerMode && status === "pending"){
      bodyHtml +=
        '<div class="decide-row">' +
          '<button class="decide-btn ok" data-act="decide-open" data-mode="approve" data-id="' + it.id + '">Approve</button>' +
          '<button class="decide-btn no" data-act="decide-open" data-mode="reject" data-id="' + it.id + '">Reject</button>' +
        '</div>';
    }

    // received tick only makes sense once a request is approved
    const checkHtml = status === "approved"
      ? '<button class="check" data-act="toggle-done" data-id="' + it.id + '" aria-label="' + (it.done ? "Mark as not received" : "Mark as received") + '">\u2713</button>'
      : "";

    return (
      '<div class="item p-' + esc(it.priority || "normal") + (it.done ? " done" : "") + '">' +
        '<div class="item-top">' +
          checkHtml +
          '<div class="item-main">' +
            '<div class="item-name">' + esc(it.name) + '</div>' +
            '<div class="item-meta">' + esc(it.addedBy || "") +
              (it.dateKey ? " \u00B7 " + prettyDate(it.dateKey) : "") +
              (it.createdAt ? " \u00B7 " + prettyTime(it.createdAt) : "") +
              (status === "approved" && it.done ? " \u00B7 received" : "") + '</div>' +
          '</div>' +
          '<span class="st ' + esc(status) + '">' + esc(status) + '</span>' +
          (managerMode ? '<button class="del-btn" data-act="delete" data-id="' + it.id + '" aria-label="Delete request">\u2715</button>' : "") +
        '</div>' +
        bodyHtml +
      '</div>'
    );
  }

  function renderInventory(){
    const invItems = items.filter(it => it.type === "bar");
    const byTime = list => list.slice().sort((a,b) => {
      const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
      const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
      return tb - ta;
    });
    const pending = byTime(invItems.filter(it => (it.status || "pending") === "pending"));
    const approved = byTime(invItems.filter(it => it.status === "approved"));
    const rejected = byTime(invItems.filter(it => it.status === "rejected"));

    // pending counter on the burger button
    pendDot.textContent = pending.length;
    pendDot.style.display = pending.length ? "block" : "none";

    let html = "";
    if(!invItems.length){
      html = '<div class="empty">No requests yet. Glassware, coffee beans, staff supplies \u2014 anything the bar needs goes here for the manager to approve.</div>';
    }else{
      if(pending.length) html += '<div class="inv-group-label">Awaiting approval (' + pending.length + ')</div>' + pending.map(invCard).join("");
      if(approved.length) html += '<div class="inv-group-label">Approved</div>' + approved.map(invCard).join("");
      if(rejected.length) html += '<div class="inv-group-label">Rejected</div>' + rejected.map(invCard).join("");
    }
    document.getElementById("invSection").innerHTML = html;
  }

  document.body.addEventListener("input", e => {
    const ta = e.target.closest("textarea[data-draft]");
    if(ta) noteDrafts[ta.dataset.draft] = ta.value;
    const dta = e.target.closest("textarea[data-decdraft]");
    if(dta) decisionDrafts[dta.dataset.decdraft] = dta.value;
  });

  /* ---------- delegated actions ---------- */
  document.body.addEventListener("click", async e => {
    const btn = e.target.closest("[data-act]");
    if(!btn) return;
    const id = btn.dataset.id;
    const act = btn.dataset.act;

    if(act === "open-note"){
      openNoteForms.add(id);
      render();
      const ta = document.getElementById("ta-" + id);
      if(ta){ ta.focus(); ta.selectionStart = ta.value.length; }
    }
    if(act === "cancel-note"){
      openNoteForms.delete(id);
      delete noteDrafts[id];
      render();
    }
    if(act === "save-note"){
      const ta = document.getElementById("ta-" + id);
      const val = ta ? ta.value.trim() : "";
      openNoteForms.delete(id);
      delete noteDrafts[id];
      try{ await db.collection(COL).doc(id).update({ note: val }); }
      catch(err){ console.error(err); }
      render();
    }
    if(act === "mgr-unlock"){ tryUnlock(); }
    if(act === "mgr-lock"){
      managerMode = false;
      openDecisions = {};
      decisionDrafts = {};
      renderMgrBox();
      renderInventory();
    }
    if(act === "decide-open"){
      openDecisions[id] = btn.dataset.mode === "reject" ? "reject" : "approve";
      renderInventory();
      const dta = document.getElementById("dta-" + id);
      if(dta) dta.focus();
    }
    if(act === "decide-cancel"){
      delete openDecisions[id];
      delete decisionDrafts[id];
      renderInventory();
    }
    if(act === "decide-save"){
      if(!managerMode) return;
      const mode = openDecisions[id];
      if(!mode) return;
      const dta = document.getElementById("dta-" + id);
      const val = dta ? dta.value.trim() : "";
      delete openDecisions[id];
      delete decisionDrafts[id];
      try{
        await db.collection(COL).doc(id).update({
          status: mode === "approve" ? "approved" : "rejected",
          managerNote: val
        });
      }catch(err){
        console.error(err);
        banner.style.display = "block";
        banner.textContent = "Couldn't save the decision \u2014 check your connection or Firestore rules.";
      }
      renderInventory();
    }
    if(act === "toggle-done"){
      const it = items.find(x => x.id === id);
      if(!it) return;
      try{ await db.collection(COL).doc(id).update({ done: !it.done }); }
      catch(err){ console.error(err); }
    }
    if(act === "delete"){
      if(!btn.classList.contains("confirm")){
        btn.classList.add("confirm");
        btn.textContent = "Sure?";
        setTimeout(() => {
          if(document.body.contains(btn)){
            btn.classList.remove("confirm");
            btn.textContent = "\u2715";
          }
        }, 3000);
        return;
      }
      try{ await db.collection(COL).doc(id).delete(); }
      catch(err){
        console.error(err);
        banner.style.display = "block";
        banner.textContent = "Couldn't delete \u2014 your Firestore rules may be blocking deletes. Change \u201Callow delete: if false;\u201D to \u201Cif true;\u201D and publish.";
      }
    }
  });
})();
</script>
</body>
</html>
