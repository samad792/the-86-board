<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The 86 Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1b1713;
    --surface: #241f19;
    --surface-2: #2d2620;
    --border: #3c332a;
    --text: #f2ebdf;
    --text-dim: #a89a86;
    --text-faint: #756757;
    --brass: #c48a4d;
    --brass-dim: #8c6338;
    --urgent: #c25c4e;
    --urgent-dim: #7d3d33;
    --done: #7a9473;
  }
  *{ box-sizing: border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(196,138,77,0.06), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    padding: 28px 16px 80px;
  }
  .wrap{ max-width: 640px; margin: 0 auto; }

  header{ margin-bottom: 22px; display:flex; align-items:flex-end; justify-content:space-between; gap:12px; }
  h1{
    font-family: 'Zilla Slab', Georgia, serif;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 0.5px;
    color: var(--text);
    line-height: 1;
  }
  h1 span{ color: var(--brass); }
  .subtitle{ color: var(--text-dim); font-size: 13px; margin-top: 6px; letter-spacing: 0.2px; }
  .clock{ font-family:'IBM Plex Mono', monospace; font-size:12px; color: var(--text-faint); text-align:right; white-space:nowrap; }

  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  /* ---- Add form ---- */
  .add-form{ padding: 16px; margin-bottom: 26px; }
  .add-row{ display:flex; gap:8px; }
  .add-row input[type=text]{
    flex:1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 11px 12px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
  }
  .add-row input[type=text]::placeholder{ color: var(--text-faint); }
  .add-row input[type=text]:focus{ border-color: var(--brass-dim); }

  .add-btn{
    background: var(--brass);
    color: #201a13;
    border: none;
    border-radius: 7px;
    padding: 0 18px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .add-btn:hover{ background: #d69a5c; }
  .add-btn:disabled{ background: var(--surface-2); color: var(--text-faint); cursor: not-allowed; }

  #noteInput{
    width:100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 7px;
    padding: 9px 12px;
    font-size: 13.5px;
    font-family: inherit;
    outline: none;
    resize: none;
    margin-top: 8px;
    line-height: 1.4;
    min-height: 38px;
    transition: border-color 0.15s ease;
  }
  #noteInput::placeholder{ color: var(--text-faint); }
  #noteInput:focus{ border-color: var(--brass-dim); color: var(--text); }

  .add-options{ display:flex; align-items:center; gap: 14px; margin-top: 12px; flex-wrap: wrap; }

  .seg{ display:flex; border: 1px solid var(--border); border-radius: 7px; overflow:hidden; }
  .seg button{
    background: transparent; border:none; color: var(--text-dim);
    font-family: inherit; font-size: 12.5px; font-weight: 500;
    padding: 7px 12px; cursor:pointer; letter-spacing:0.3px;
    border-right: 1px solid var(--border);
  }
  .seg button:last-child{ border-right:none; }
  .seg button.active-normal{ background: var(--surface-2); color: var(--text); }
  .seg button.active-urgent{ background: var(--urgent-dim); color: #ffdcd6; }

  select#category{
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 7px;
    padding: 7px 10px;
    font-size: 12.5px;
    font-family: inherit;
    outline: none;
  }

  /* ---- Section labels ---- */
  .section-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 0 4px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .clear-link{
    color: var(--text-faint); background:none; border:none; cursor:pointer;
    font-family:'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.5px;
    text-decoration: underline; text-underline-offset: 3px;
  }
  .clear-link:hover{ color: var(--text-dim); }

  .list{ display:flex; flex-direction:column; gap: 10px; margin-bottom: 30px; }

  /* ---- Ticket card ---- */
  .ticket{
    position:relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--brass-dim);
    border-radius: 8px;
    padding: 13px 14px 13px 16px;
    display:flex;
    gap: 12px;
    align-items:flex-start;
    animation: slideIn 0.25s ease;
  }
  .ticket.urgent{ border-left-color: var(--urgent); }
  .ticket.done{ opacity: 0.5; border-left-color: var(--done); }
  @keyframes slideIn{ from{ opacity:0; transform: translateY(-4px);} to{ opacity:1; transform:translateY(0);} }

  .resolve-btn{
    flex-shrink:0;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--text-faint);
    background: transparent;
    cursor:pointer;
    margin-top: 2px;
    display:flex; align-items:center; justify-content:center;
    transition: all 0.15s ease;
  }
  .resolve-btn:hover{ border-color: var(--done); }
  .ticket.done .resolve-btn{ background: var(--done); border-color: var(--done); }
  .resolve-btn svg{ width:12px; height:12px; opacity:0; transition: opacity 0.15s ease; }
  .ticket.done .resolve-btn svg{ opacity:1; }

  .ticket-body{ flex:1; min-width:0; }
  .ticket-text{ font-size: 15px; color: var(--text); line-height:1.4; word-break: break-word; }
  .ticket.done .ticket-text{ text-decoration: line-through; color: var(--text-faint); }

  .ticket-note{
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.45;
    margin-top: 4px;
    padding-left: 10px;
    border-left: 2px solid var(--border);
    word-break: break-word;
    white-space: pre-wrap;
  }
  .ticket.done .ticket-note{ color: var(--text-faint); }

  .ticket-meta{ display:flex; align-items:center; gap:8px; margin-top: 6px; flex-wrap:wrap; }
  .tag{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--text-faint);
    letter-spacing: 0.3px;
  }
  .stamp{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--urgent);
    border: 1px solid var(--urgent-dim);
    padding: 2px 6px;
    border-radius: 4px;
    transform: rotate(-2deg);
    text-transform: uppercase;
  }

  .del-btn{
    flex-shrink:0;
    background:none; border:none; color: var(--text-faint);
    cursor:pointer; font-size: 16px; padding: 2px 4px; line-height:1;
    opacity: 0; transition: opacity 0.15s ease;
  }
  .ticket:hover .del-btn{ opacity: 0.6; }
  .del-btn:hover{ opacity: 1 !important; color: var(--urgent); }

  .empty{
    text-align:center;
    padding: 34px 20px;
    color: var(--text-faint);
    font-size: 14px;
  }
  .empty .big{ font-family:'Zilla Slab', serif; font-size: 17px; color: var(--text-dim); margin-bottom: 4px; }

  .resolved-wrap.collapsed .list{ display:none; }
  .resolved-toggle{
    display:flex; align-items:center; gap:6px;
    background:none; border:none; cursor:pointer;
    color: var(--text-faint); font-family:'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing:1.5px; text-transform:uppercase;
    margin: 0 4px 10px;
  }
  .resolved-toggle .chev{ transition: transform 0.15s ease; display:inline-block; }
  .resolved-wrap.collapsed .chev{ transform: rotate(-90deg); }

  footer{ text-align:center; color: var(--text-faint); font-size: 11.5px; margin-top: 10px; font-family:'IBM Plex Mono', monospace; }

  @media (max-width: 420px){
    h1{ font-size: 25px; }
    .clock{ display:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>The <span>86</span> Board</h1>
      <div class="subtitle">Leave it here for whoever opens next.</div>
    </div>
    <div class="clock" id="clock"></div>
  </header>

  <div class="card add-form">
    <div class="add-row">
      <input type="text" id="itemInput" placeholder="e.g. Golden syrup almost out" maxlength="140" />
      <button class="add-btn" id="addBtn" disabled>Add</button>
    </div>
    <textarea id="noteInput" placeholder="Add a note (optional) — where to find it, who to call, anything the opener should know" maxlength="300" rows="1"></textarea>
    <div class="add-options">
      <div class="seg" id="prioritySeg">
        <button data-val="normal" class="active-normal">Normal</button>
        <button data-val="urgent">Urgent</button>
      </div>
      <select id="category">
        <option value="stock">Stock</option>
        <option value="garnish">Garnish / Prep</option>
        <option value="equipment">Equipment</option>
        <option value="cleaning">Cleaning</option>
        <option value="other">Other</option>
      </select>
    </div>
  </div>

  <div class="section-label">On the board</div>
  <div class="list" id="openList"></div>
  <div class="empty" id="emptyState" style="display:none;">
    <div class="big">Board's clear.</div>
    Nothing waiting for the opener right now.
  </div>

  <div class="resolved-wrap collapsed" id="resolvedWrap">
    <button class="resolved-toggle" id="resolvedToggle">
      <span class="chev">▾</span> <span id="resolvedCount">Cleared (0)</span>
    </button>
    <div class="list" id="resolvedList"></div>
  </div>

  <footer id="footerMsg">syncing…</footer>
</div>

<script>
const CATEGORY_LABEL = {
  stock: 'Stock', garnish: 'Garnish / Prep', equipment: 'Equipment', cleaning: 'Cleaning', other: 'Other'
};
const STORAGE_KEY = 'eightysix-flags';
let flags = [];
let priority = 'normal';

const itemInput = document.getElementById('itemInput');
const noteInput = document.getElementById('noteInput');
const addBtn = document.getElementById('addBtn');
const categorySel = document.getElementById('category');
const prioritySeg = document.getElementById('prioritySeg');
const openList = document.getElementById('openList');
const resolvedList = document.getElementById('resolvedList');
const resolvedWrap = document.getElementById('resolvedWrap');
const resolvedToggle = document.getElementById('resolvedToggle');
const resolvedCount = document.getElementById('resolvedCount');
const emptyState = document.getElementById('emptyState');
const footerMsg = document.getElementById('footerMsg');
const clockEl = document.getElementById('clock');

function tickClock(){
  clockEl.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
tickClock();
setInterval(tickClock, 30000);

prioritySeg.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;
  priority = btn.dataset.val;
  [...prioritySeg.children].forEach(b => b.classList.remove('active-normal','active-urgent'));
  btn.classList.add(priority === 'urgent' ? 'active-urgent' : 'active-normal');
});

itemInput.addEventListener('input', () => {
  addBtn.disabled = itemInput.value.trim().length === 0;
});
itemInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !addBtn.disabled) addFlag();
});
addBtn.addEventListener('click', addFlag);

noteInput.addEventListener('input', () => {
  noteInput.style.height = 'auto';
  noteInput.style.height = noteInput.scrollHeight + 'px';
});

resolvedToggle.addEventListener('click', () => {
  resolvedWrap.classList.toggle('collapsed');
});

async function loadFlags(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    flags = res && res.value ? JSON.parse(res.value) : [];
  }catch(err){
    flags = [];
  }
  render();
  footerMsg.textContent = 'shared board · visible to everyone on shift';
}

async function saveFlags(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(flags), true);
  }catch(err){
    footerMsg.textContent = 'could not save — check connection';
  }
}

function addFlag(){
  const text = itemInput.value.trim();
  if(!text) return;
  flags.unshift({
    id: 'f' + Date.now() + Math.random().toString(36).slice(2,6),
    text,
    note: noteInput.value.trim(),
    category: categorySel.value,
    priority,
    done: false,
    createdAt: Date.now(),
    resolvedAt: null
  });
  itemInput.value = '';
  noteInput.value = '';
  noteInput.style.height = 'auto';
  addBtn.disabled = true;
  render();
  saveFlags();
}

function toggleDone(id){
  const f = flags.find(f => f.id === id);
  if(!f) return;
  f.done = !f.done;
  f.resolvedAt = f.done ? Date.now() : null;
  render();
  saveFlags();
}

function deleteFlag(id){
  flags = flags.filter(f => f.id !== id);
  render();
  saveFlags();
}

function timeLabel(ts){
  return new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function ticketHTML(f){
  const urgentClass = f.priority === 'urgent' ? ' urgent' : '';
  const doneClass = f.done ? ' done' : '';
  const stamp = f.priority === 'urgent' ? '<span class="stamp">Priority</span>' : '';
  const timeText = f.done ? ('cleared ' + timeLabel(f.resolvedAt)) : ('left ' + timeLabel(f.createdAt));
  const noteHTML = f.note ? `<div class="ticket-note">${escapeHTML(f.note)}</div>` : '';
  return `
    <div class="ticket${urgentClass}${doneClass}" data-id="${f.id}">
      <button class="resolve-btn" onclick="toggleDone('${f.id}')" title="Mark done" aria-label="Mark done">
        <svg viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="#201a13" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="ticket-body">
        <div class="ticket-text">${escapeHTML(f.text)}</div>
        ${noteHTML}
        <div class="ticket-meta">
          <span class="tag">${CATEGORY_LABEL[f.category] || 'Other'}</span>
          <span class="tag">·</span>
          <span class="tag">${timeText}</span>
          ${stamp}
        </div>
      </div>
      <button class="del-btn" onclick="deleteFlag('${f.id}')" title="Remove" aria-label="Remove">×</button>
    </div>`;
}

function escapeHTML(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render(){
  const open = flags.filter(f => !f.done)
    .sort((a,b) => (b.priority==='urgent') - (a.priority==='urgent') || b.createdAt - a.createdAt);
  const resolved = flags.filter(f => f.done).sort((a,b) => b.resolvedAt - a.resolvedAt);

  openList.innerHTML = open.map(ticketHTML).join('');
  resolvedList.innerHTML = resolved.map(ticketHTML).join('');
  resolvedCount.textContent = `Cleared (${resolved.length})`;
  resolvedWrap.style.display = resolved.length ? 'block' : 'none';
  emptyState.style.display = open.length ? 'none' : 'block';
}

loadFlags();
</script>
</body>
</html>
